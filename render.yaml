services:
  - type: web
    name: modern-security-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: modern_security.db
    plan: free
